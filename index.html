<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VK Mini Game: Поймай квадрат</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #121212;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #timer {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      z-index: 100;
      user-select: none;
    }

    #score-display {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      color: #4caf50;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      z-index: 100;
      user-select: none;
    }

    /* Квадрат-цель */
    #target {
      position: absolute;
      width: 100px;
      height: 100px;
      background-color: #FF8C00;
      border: 4px solid #FF4500;
      border-radius: 12px;
      cursor: pointer;
      z-index: 10;
      display: block;
      top: 100px;
      left: 100px;
      box-shadow: 0 6px 15px rgba(255, 140, 0, 0.4);
      will-change: left, top;
      user-select: none;
      transition: transform 0.1s ease;
    }

    #target:active {
      transform: scale(0.92);
    }

    #save-score-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      font-size: 20px;
      font-weight: 700;
      background-color: #2481cc;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(36, 129, 204, 0.4);
      display: none;
    }

    #save-score-btn:active {
      transform: translateX(-50%) scale(0.98);
    }

    #game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 90;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #final-message {
      font-size: 36px;
      color: #ff5252;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    #final-score {
      font-size: 60px;
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="timer">30</div>
    <div id="score-display">Счёт: 0</div>
    <div id="target"></div>
    <button id="save-score-btn" onclick="saveScore()">Сохранить результат</button>

    <div id="game-overlay">
      <div id="final-message">Время вышло!</div>
      <div id="final-score">0</div>
    </div>
  </div>

  <script>
    // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ОТ NGROK
    const API_URL = 'https://ngrok.com/docs/errors/err_ngrok_4018';

    let score = 0;
    let timeLeft = 30;
    let timerInterval = null;
    let isGameActive = false;
    let vkUserId = 'unknown';

    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score-display');
    const targetEl = document.getElementById('target');
    const saveBtn = document.getElementById('save-score-btn');
    const overlay = document.getElementById('game-overlay');
    const finalScoreEl = document.getElementById('final-score');

    if (window.vkBridge) {
      window.vkBridge.send('VKWebAppInit');
      window.vkBridge.on('VKWebAppGetUserInfoResult', (e) => {
        vkUserId = e.data.user_id.toString();
      });
    } else {
      console.log('VK Bridge не найден. Игра запущена вне VK.');
    }

    function updateTimer() {
      if (!timerEl) return;
      const displayTime = Math.max(0, timeLeft);
      timerEl.textContent = displayTime;
      timerEl.style.color = displayTime <= 5 ? '#ff5252' : '#fff';
    }

    function startTimer() {
      timeLeft = 30;
      updateTimer();
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function updateScore() {
      if (scoreEl) {
        scoreEl.textContent = `Счёт: \${score}`;
      }
    }

    function spawnTarget() {
      if (!isGameActive || !targetEl) return;

      const gameContainer = document.getElementById('game-container');
      if (!gameContainer) return;

      const cWidth = gameContainer.clientWidth || window.innerWidth;
      const cHeight = gameContainer.clientHeight || window.innerHeight;

      const size = 100;
      const maxX = Math.max(0, cWidth - size);
      const maxY = Math.max(0, cHeight - size);

      const randomX = Math.floor(Math.random() * (maxX + 1));
      const randomY = Math.floor(Math.random() * (maxY + 1));

      targetEl.style.left = `\${randomX}px`;
      targetEl.style.top = `\${randomY}px`;
      
      console.log(`[MOVE] Квадрат перемещён: X=${randomX}, Y=${randomY}`);
    }

    function startGame() {
      score = 0;
      updateScore();
      isGameActive = true;

      overlay.style.display = 'none';
      saveBtn.style.display = 'none';

      startTimer();
      spawnTarget();
      console.log('[GAME] Start game successful');
    }

    function endGame() {
      isGameActive = false;
      clearInterval(timerInterval);

      targetEl.style.display = 'none';
      finalScoreEl.textContent = score;
      overlay.style.display = 'flex';
      saveBtn.style.display = 'block';
      document.getElementById('game-container').style.pointerEvents = 'none';
      console.log('[GAME] End game');
    }

    // ГЛАВНОЕ ИСПРАВЛЕНИЕ: перемещение по клику
    if (targetEl) {
      targetEl.addEventListener('click', () => {
        if (!isGameActive) return;

        score++;
        updateScore();
        spawnTarget(); // <-- Теперь квадрат прыгает сразу при клике
      });
    }

    async function saveScore() {
      clearInterval(timerInterval);
      isGameActive = false;

      const payload = { vk_user_id: vkUserId, score: score };

      try {
        const res = await fetch(`\${API_URL}/api/save_score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert('Результат успешно сохранён!');
        } else {
          const errData = await res.json().catch(() => ({}));
          alert(`Ошибка сохранения: \${errData.detail || 'Неизвестная ошибка'}`);
        }
      } catch (error) {
        console.error('Network error:', error);
        alert('Ошибка сети. Проверьте ngrok и бэкенд.');
      }
    }

    setTimeout(startGame, 200);
  </script>
</body>
</html>
