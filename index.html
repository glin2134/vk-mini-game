<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поймай Квадрат: Pro Edition</title>
  
  <!-- Фикс иконки -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      touch-action: none; /* Отключаем зум на мобильных */
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a0f29 0%, #050210 100%);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: block;
    }

    /* Сетка */
    .grid-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* Контейнер */
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Квадрат */
    #square {
      width: 70px;
      height: 70px;
      background-color: #ffd700;
      position: absolute;
      cursor: crosshair;
      border-radius: 8px;
      display: none;
      box-shadow: 
        0 0 0 0 rgba(255, 215, 0, 0.4),
        0 0 15px rgba(255, 215, 0, 0.8),
        inset 0 0 10px rgba(0, 0, 0, 0.5);
      transition: transform 0.1s ease-out, box-shadow 0.1s;
      will-change: left, top, width, height;
      pointer-events: auto;
      z-index: 10;
    }

    #square:hover {
      box-shadow: 
        0 0 0 5px rgba(255, 215, 0, 0.6),
        0 0 25px rgba(255, 215, 0, 1),
        inset 0 0 15px rgba(0, 0, 0, 0.3);
      transform: scale(1.05);
    }

    #square.clicked {
      animation: pop-out 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pop-out {
      to { transform: scale(0); opacity: 0; }
    }

    /* Кнопка Старт */
    #start-btn {
      padding: 20px 60px;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      z-index: 20;
    }

    #start-btn:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
      transform: translateY(-3px);
    }

    /* Экран конца игры */
    #end-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      display: none;
      backdrop-filter: blur(5px);
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      background: linear-gradient(to right, #fff, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-container {
      font-size: 1.5rem;
      color: #0ff;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .restart-btn {
      padding: 15px 40px;
      font-size: 18px;
      background: #0ff;
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #0ff;
    }

    /* Частицы */
    .particle {
      position: absolute;
      background-color: #ffd700;
      border-radius: 50%;
      pointer-events: none;
      z-index: 15;
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="grid-overlay"></div>

  <div id="game-container">
    <div id="square"></div>
    <button id="start-btn">Начать игру</button>
  </div>

  <div id="end-screen">
    <h1>Игра окончена!</h1>
    <div class="stats-container">
      Ваш счет: <span id="final-score">0</span><br>
      Рекорд: <span id="high-score">0</span>
    </div>
    <button class="restart-btn" id="restart-btn">Сыграть снова</button>
  </div>

  <script>
    const square = document.getElementById('square');
    const startBtn = document.getElementById('start-btn');
    const container = document.getElementById('game-container');
    const endScreen = document.getElementById('end-screen');
    const finalScoreSpan = document.getElementById('final-score');
    const highScoreSpan = document.getElementById('high-score');
    const restartBtn = document.getElementById('restart-btn');

    let moveInterval;
    let isPlaying = false;
    let catchCount = 0;
    let baseSpeed = 800; // мс между перемещениями
    let currentSpeed = baseSpeed;
    let squareSize = 70; // px
    let highScore = localStorage.getItem('highScore') || 0;
    highScoreSpan.textContent = highScore;

    // --- ЗВУКОВЫЕ ЭФФЕКТЫ (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      if (type === 'click') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'win') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.5);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      }
    }

    // --- ЧАСТИЦЫ ---
    function createParticles(x, y) {
      const count = 10;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        p.style.width = '4px';
        p.style.height = '4px';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        
        // Случайный размер и цвет
        const size = Math.random() * 3 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.backgroundColor = `hsl(\${Math.random() * 50 + 40}, 100%, 50%)`;

        container.appendChild(p);

        // Физика частиц
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 100 + 50;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        const duration = Math.random() * 500 + 500;

        p.animate([
          {
            transform: `translate(${vx}px, ${vy}px)`,
            opacity: 1
          },
          {
            transform: `translate(${vx * 2}px, ${vy * 2}px)`,
            opacity: 0
          }
        ], {
          duration: duration,
          easing: 'cubic-bezier(0, .9, .57, 1)',
          fill: 'forwards'
        }).onfinish = () => p.remove();
      }
    }

    function moveSquare() {
      if (!isPlaying) return;
      
      const maxX = container.clientWidth - square.offsetWidth;
      const maxY = container.clientHeight - square.offsetHeight;
      
      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;
      
      square.style.left = randomX + 'px';
      square.style.top = randomY + 'px';
      
      square.classList.remove('clicked');
      void square.offsetWidth; 
    }

    function startGame() {
      if (isPlaying) return;
      
      isPlaying = true;
      catchCount = 0;
      currentSpeed = baseSpeed;
      squareSize = 70;
      
      startBtn.style.display = 'none';
      endScreen.style.display = 'none';
      square.style.display = 'block';
      square.style.width = squareSize + 'px';
      square.style.height = squareSize + 'px';
      
      moveSquare();
      moveInterval = setInterval(moveSquare, currentSpeed);
    }

    function handleSquareClick(e) {
      if (!isPlaying) return;
      
      e.stopPropagation();
      catchCount++;
      
      // Звук клика
      playSound('click');
      
      // Частицы
      const rect = square.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      createParticles(centerX, centerY);
      
      // Анимация исчезновения
      square.classList.add('clicked');
      
      // Логика сложности
      if (catchCount % 5 === 0) {
        // Каждые 5 пойманных квадратов: ускоряемся и уменьшаемся
        currentSpeed = Math.max(200, currentSpeed - 100);
        squareSize = Math.max(30, squareSize - 10);
        square.style.width = squareSize + 'px';
        square.style.height = squareSize + 'px';
        clearInterval(moveInterval);
        moveInterval = setInterval(moveSquare, currentSpeed);
      }

      setTimeout(() => {
        if (isPlaying) {
          moveSquare();
        }
      }, 150);
    }

    function endGame() {
      isPlaying = false;
      clearInterval(moveInterval);
      
      square.style.display = 'none';
      
      finalScoreSpan.textContent = catchCount;
      
      // Обновление рекорда
      if (catchCount > highScore) {
        highScore = catchCount;
        localStorage.setItem('highScore', highScore);
        highScoreSpan.textContent = highScore;
      }
      
      playSound('win');
      endScreen.style.display = 'flex';
    }

    // Обработчики событий
    square.addEventListener('click', handleSquareClick);
    square.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleSquareClick(e);
    });
    
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isPlaying) {
        endGame();
      }
    });
  </script>
</body>
</html>
