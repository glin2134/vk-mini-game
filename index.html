<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VK Mini Game: Поймай круг</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #19191a;
      color: white;
      font-family: sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000; /* Черный фон для контраста */
    }

    #timer {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 32px;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      z-index: 100;
    }

    #score-display {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      color: #4caf50;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      z-index: 100;
    }

    /* ИСПРАВЛЕННЫЙ СТИЛЬ КРУГА */
    #target {
      position: absolute;
      width: 100px;
      height: 100px;
      background-color: #ffff00; /* Ярко-желтый */
      border: 4px solid #ff0000; /* Красная рамка */
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      display: block; /* Всегда видим */
      top: 100px;
      left: 100px;
      box-shadow: 0 0 15px rgba(255, 255, 0, 0.6);
      user-select: none;
    }

    #save-score-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      font-size: 20px;
      background: #2481cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
      display: none;
    }

    #game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 90;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #final-message {
      font-size: 36px;
      color: #ff5252;
      font-weight: bold;
      margin-bottom: 20px;
    }

    #final-score {
      font-size: 60px;
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="timer">30</div>
    <div id="score-display">Счёт: 0</div>
    <div id="target"></div>
    <button id="save-score-btn" onclick="saveScore()">Сохранить результат</button>
    
    <div id="game-overlay">
      <div id="final-message">Время вышло!</div>
      <div id="final-score">0</div>
    </div>
  </div>

  <script>
    // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ОТ NGROK
    const API_URL = 'https://ngrok.com/docs/errors/err_ngrok_4018'; 
    
    let score = 0;
    let timeLeft = 30;
    let timerInterval = null;
    let targetInterval = null;
    let isGameActive = false;
    let vkUserId = 'unknown';

    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score-display');
    const targetEl = document.getElementById('target');
    const saveBtn = document.getElementById('save-score-btn');
    const overlay = document.getElementById('game-overlay');
    const finalScoreEl = document.getElementById('final-score');

    if (window.vkBridge) {
      window.vkBridge.send('VKWebAppInit');
      window.vkBridge.on('VKWebAppGetUserInfoResult', (e) => {
        vkUserId = e.data.user_id.toString();
      });
    } else {
      console.log('VK Bridge не найден. Игра запущена вне VK.');
    }

    function updateTimer() {
      if (!timerEl) return;
      const displayTime = Math.max(0, timeLeft);
      timerEl.textContent = displayTime;
      timerEl.style.color = displayTime <= 5 ? '#ff5252' : 'white';
    }

    function startTimer() {
      timeLeft = 30;
      updateTimer();
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function updateScore() {
      if (scoreEl) scoreEl.textContent = `Счёт: \${score}`;
    }

    function spawnTarget() {
      if (!isGameActive || !targetEl) return;

      const gameContainer = document.getElementById('game-container');
      if (!gameContainer) return;

      // ЗАЩИТА: берем размеры окна, если контейнер не отрисован
      const cWidth = gameContainer.clientWidth || window.innerWidth;
      const cHeight = gameContainer.clientHeight || window.innerHeight;
      
      const size = 100; // Размер круга из CSS
      const maxX = Math.max(0, cWidth - size);
      const maxY = Math.max(0, cHeight - size);

      const randomX = Math.floor(Math.random() * (maxX + 1));
      const randomY = Math.floor(Math.random() * (maxY + 1));

      targetEl.style.left = `\${randomX}px`;
      targetEl.style.top = `\${randomY}px`;
      
      // Для отладки в консоли
      // console.log(`Spawned at: ${randomX}, ${randomY}`);
    }

    function startGame() {
      score = 0;
      updateScore();
      isGameActive = true;
      
      overlay.style.display = 'none';
      saveBtn.style.display = 'none';
      
      startTimer();
      spawnTarget();

      clearInterval(targetInterval);
      targetInterval = setInterval(spawnTarget, 1500);
      
      console.log('[GAME] Start game successful');
    }

    function endGame() {
      isGameActive = false;
      clearInterval(timerInterval);
      clearInterval(targetInterval);
      
      targetEl.style.display = 'none';
      finalScoreEl.textContent = score;
      overlay.style.display = 'flex';
      saveBtn.style.display = 'block';
      document.getElementById('game-container').style.pointerEvents = 'none';
      console.log('[GAME] End game');
    }

    if (targetEl) {
      targetEl.addEventListener('click', () => {
        if (!isGameActive) return;
        score++;
        updateScore();
        // Эффект исчезновения
        targetEl.style.opacity = '0';
        setTimeout(() => {
            targetEl.style.opacity = '1';
        }, 100);
      });
    }

    async function saveScore() {
      clearInterval(timerInterval);
      clearInterval(targetInterval);
      isGameActive = false;

      const payload = { vk_user_id: vkUserId, score: score };

      try {
        const res = await fetch(`\${API_URL}/api/save_score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert('Результат сохранён!');
        } else {
          alert('Ошибка сохранения');
        }
      } catch (error) {
        console.error(error);
        alert('Ошибка сети. Проверьте ngrok.');
      }
    }

    // Запуск с небольшой задержкой
    setTimeout(startGame, 200);
  </script>
</body>
</html>
