<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Поймай Квадрат: Pro Edition</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <style>
    :root {
      --bg-color: #050210;
      --grid-color: rgba(255, 255, 255, 0.05);
      --text-color: #ffffff;
      --accent: #00f0ff;
      --danger: #ff3b3b;
      --success: #00ff9d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }

    body {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a0f29 0%, var(--bg-color) 100%);
      color: var(--text-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .grid-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.3;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* HUD */
    .hud {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    .stat-box {
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      backdrop-filter: blur(5px);
    }

    .combo-display {
      color: var(--success);
      font-weight: bold;
      text-transform: uppercase;
    }

    .timer-bar-container {
      position: absolute;
      top: 70px;
      left: 20px;
      right: 20px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      z-index: 10;
    }

    .timer-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      transition: width 0.1s linear, background 0.3s;
    }

    /* Квадрат */
    #square {
      width: 60px;
      height: 60px;
      position: absolute;
      cursor: crosshair;
      border-radius: 4px;
      display: none;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      will-change: left, top, transform;
      pointer-events: auto;
      z-index: 20;
      transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #square::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 2px;
      box-shadow: 0 0 15px currentColor;
    }

    #square.clicked {
      animation: shrink-pop 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes shrink-pop {
      to { transform: scale(0); opacity: 0; }
    }

    /* Кнопки */
    #start-btn {
      padding: 18px 48px;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s ease;
      z-index: 30;
      position: relative;
      overflow: hidden;
    }

    #start-btn:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 20px var(--accent);
      transform: scale(1.05);
    }

    /* Экран конца игры */
    #end-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 40;
      display: none;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
    }

    .final-score {
      font-size: 2.5rem;
      color: var(--success);
      margin-bottom: 30px;
      text-shadow: 0 0 15px var(--success);
    }

    .restart-btn {
      padding: 15px 40px;
      font-size: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent);
    }

    /* Частицы */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* Анимация рекорда */
    .record-flash {
      animation: pulse-white 0.5s infinite alternate;
    }

    @keyframes pulse-white {
      from { box-shadow: 0 0 30px #fff; }
      to { box-shadow: 0 0 60px #fff, 0 0 30px var(--accent); }
    }
  </style>
</head>
<body>

  <div class="grid-overlay"></div>

  <div id="game-container">
    <div class="hud">
      <div class="stat-box">
        <div style="font-size: 0.8rem; opacity: 0.7;">Счёт</div>
        <div id="score" style="font-size: 1.5rem; font-weight: bold;">0</div>
      </div>
      <div class="stat-box combo-display" id="combo-text">COMBO: x1</div>
      <div class="stat-box">
        <div style="font-size: 0.8rem; opacity: 0.7;">Рекорд</div>
        <div id="high-score">0</div>
      </div>
    </div>

    <div class="timer-bar-container">
      <div class="timer-bar-fill" id="timer-bar"></div>
    </div>

    <div id="square"></div>

    <button id="start-btn">Начать игру</button>
  </div>

  <div id="end-screen">
    <h1>Игра окончена</h1>
    <div class="final-score">Счёт: <span id="final-score">0</span></div>
    <button class="restart-btn">Сыграть снова</button>
  </div>

<script>
  const square = document.getElementById('square');
  const startBtn = document.getElementById('start-btn');
  const endScreen = document.getElementById('end-screen');
  const restartBtn = document.querySelector('.restart-btn');
  const scoreEl = document.getElementById('score');
  const comboText = document.getElementById('combo-text');
  const highScoreEl = document.getElementById('high-score');
  const timerBar = document.getElementById('timer-bar');
  const finalScoreEl = document.getElementById('final-score');

  let score = 0;
  let combo = 1;
  let highScore = parseInt(localStorage.getItem('catch-square-highscore')) || 0;
  let gameActive = false;
  let squareInterval;
  let timerInterval;
  let timeLeft = 30;
  let isRecord = false;

  // Инициализация рекорда
  highScoreEl.innerText = highScore;

  // Генерация звука (Web Audio API)
  function playSound(type) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'miss') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'record') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // Создание частиц
  function createParticles(x, y, count = 15) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.style.left = `\${x}px`;
      p.style.top = `\${y}px`;
      p.style.width = `\${Math.random() * 4 + 2}px`;
      p.style.height = p.style.width;
      p.style.backgroundColor = `hsl(\${Math.random() * 60 + 40}, 100%, 50%)`;
      
      const tx = (Math.random() - 0.5) * 200;
      const ty = (Math.random() - 0.5) * 200;
      
      document.body.appendChild(p);
      
      setTimeout(() => {
        p.style.transition = 'all 0.5s ease-out';
        p.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
        p.style.opacity = '0';
        setTimeout(() => p.remove(), 500);
      }, 0);
    }
  }

  // Логика движения квадрата
  function moveSquare() {
    if (!gameActive) return;

    const container = document.getElementById('game-container');
    const rect = container.getBoundingClientRect();
    const squareSize = 60;
    
    // Ограничиваем область появления (отступ 10px от краев)
    const maxX = rect.width - squareSize - 10;
    const maxY = rect.height - squareSize - 10;

    const newX = Math.random() * maxX;
    const newY = Math.random() * maxY;

    square.style.left = `\${newX}px`;
    square.style.top = `\${newY}px`;

    // Цвет зависит от сложности (чем больше счёт, тем "опаснее" цвет)
    const hue = Math.min(20 + (score * 2), 60); // От жёлто-зелёного к оранжево-красному
    square.style.backgroundColor = `hsl(\${hue}, 100%, 50%)`;
    square.style.color = `hsl(\${hue}, 100%, 80%)`; // Цвет свечения
    square.style.boxShadow = `0 0 10px currentColor, 0 0 20px currentColor`;
    
    // Меняем размер в зависимости от сложности
    const size = Math.max(30, 60 - score * 0.5);
    square.style.width = `\${size}px`;
    square.style.height = `\${size}px`;
  }

  // Таймер
  function startTimer() {
    timeLeft = 30;
    timerInterval = setInterval(() => {
      timeLeft--;
      const percentage = (timeLeft / 30) * 100;
      timerBar.style.width = `\${percentage}%`;
      
      // Цвет полосы меняется от зелёного к красному
      if (percentage < 30) {
        timerBar.style.background = 'linear-gradient(90deg, var(--danger), #ff8800)';
      } else if (percentage < 60) {
        timerBar.style.background = 'linear-gradient(90deg, var(--accent), var(--success))';
      }

      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    gameActive = false;
    clearInterval(squareInterval);
    clearInterval(timerInterval);
    square.style.display = 'none';
    
    finalScoreEl.innerText = score;
    endScreen.style.display = 'flex';

    if (score > highScore) {
      localStorage.setItem('catch-square-highscore', score);
      highScoreEl.innerText = score;
      // Эффект рекорда
      document.body.style.animation = 'pulse-white 0.5s infinite alternate';
      setTimeout(() => document.body.style.animation = '', 2000);
      playSound('record');
    }
  }

  function startGame() {
    score = 0;
    combo = 1;
    scoreEl.innerText = score;
    comboText.innerText = `COMBO: x\${combo}`;
    
    endScreen.style.display = 'none';
    startBtn.style.display = 'none';
    square.style.display = 'block';
    
    gameActive = true;
    
    // Частота появления квадрата уменьшается со временем (игра ускоряется)
    const getInterval = () => Math.max(800, 1500 - score * 20);
    
    squareInterval = setInterval(moveSquare, getInterval());
    startTimer();

    // Обновляем интервал движения каждые 5 секунд, чтобы игра ускорялась плавно
    setInterval(() => {
      if(gameActive) clearInterval(squareInterval);
      if(gameActive) squareInterval = setInterval(moveSquare, getInterval());
    }, 5000);
  }

  // Обработчики событий
  square.addEventListener('mousedown', (e) => {
    if (!gameActive) return;
    e.preventDefault();
    e.stopPropagation();
    
    // Эффект нажатия
    square.classList.add('clicked');
    setTimeout(() => square.classList.remove('clicked'), 150);
    
    // Частицы и звук
    const rect = square.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    createParticles(x, y);
    playSound('click');

    // Логика очков
    score += 10 * combo;
    scoreEl.innerText = score;
    
    combo++;
    comboText.innerText = `COMBO: x\${combo}`;
    comboText.style.color = `hsl(\${Math.min(120, combo * 10)}, 100%, 50%)`;
  });

  // Промах (клик мимо квадрата)
  document.getElementById('game-container').addEventListener('mousedown', (e) => {
    if (!gameActive) return;
    if (e.target.id !== 'square') {
      // Промах
      playSound('miss');
      combo = 1;
      comboText.innerText = `COMBO: x\${combo}`;
      comboText.style.color = '#00ff9d';
      
      // Встряска экрана при промахе
      document.body.style.animation = 'shake 0.3s';
      setTimeout(() => document.body.style.removeProperty('animation'), 300);
    }
  });

  // Адаптивность для тач-устройств
  square.addEventListener('touchstart', (e) => {
    e.preventDefault();
    // Эмулируем клик мышью для логики
    const mouseEvent = new MouseEvent('mousedown', {
      bubbles: true,
      cancelable: true,
      view: window,
      clientX: e.touches.clientX,
      clientY: e.touches.clientY
    });
    square.dispatchEvent(mouseEvent);
  }, {passive: false});

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // CSS анимации для встряски
  const styleSheet = document.createElement("style");
  styleSheet.innerText = `
    @keyframes shake {
      0% { transform: translate(0,0); }
      25% { transform: translate(-5px, 5px); }
      50% { transform: translate(5px, -5px); }
      75% { transform: translate(-5px, 5px); }
      100% { transform: translate(0,0); }
    }
  `;
  document.head.appendChild(styleSheet);

</script>
</body>
</html>
